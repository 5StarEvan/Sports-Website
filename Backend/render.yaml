services:
  - type: web
    name: nba-api
    env: python
    # Use production requirements that include PyTorch
    buildCommand: pip install -r requirements_production.txt
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PORT
        value: 5000
      - key: FLASK_ENV
        value: production
    # Health check endpoint
    healthCheckPath: /api/health





